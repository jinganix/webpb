codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

flag_management:
  individual_flags:
    - name: lib-commons
      carryforward: true
    - name: lib-utilities
      carryforward: true
    - name: plugin
      carryforward: true
    - name: runtime-java
      carryforward: true
    - name: runtime-processor
      carryforward: true
    - name: sample-backend
      carryforward: true
    - name: frontend
      carryforward: true
    - name: runtime-ts
      carryforward: true
