syntax = "proto3";

package HttpMethodsProto;

option java_package = "http";

import "webpb/WebpbExtend.proto";

message PostRequest {
  option (m_opts).opt = {
    method: "POST"
    context: "api"
    path: "/items/{id}"
  };

  int32 id = 1;
  string body = 2;
}

message PutRequest {
  option (m_opts).opt = {
    method: "PUT"
    context: "api"
    path: "/items/{id}"
  };

  int32 id = 1;
  string body = 2;
}

message DeleteRequest {
  option (m_opts).opt = {
    method: "DELETE"
    context: "api"
    path: "/items/{id}"
  };

  int32 id = 1;
}
