syntax = "proto2";

package TsNumericDebugProto;

option java_package = "constant.tsnumericdebug";

import "webpb/WebpbExtend.proto";

option (f_opts).ts = {
  enum_auto_alias: false
  enum_values_literal: true
  enum_by_name: true
  enum_by_value: true
};

enum LogLevel {
  info = 0;
  warn = 1;
  error = 2;
}
