syntax = "proto2";

package MapValueJsDtsProto;

import "webpb/WebpbExtend.proto";

option (f_opts).ts = {
  default_const_enum: true
  enum_emit_mode: "js_dts"
  enum_auto_alias: false
  enum_values_literal: true
};

enum Baz {
  x = 0;
  y = 1;
}

message MapValueJsDtsPb {
  map<string, Baz> sort = 1;
}
