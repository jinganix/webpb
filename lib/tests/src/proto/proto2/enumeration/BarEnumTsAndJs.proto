syntax = "proto2";

package BarTsEnum;

option java_package = "constant.bartsenum";

import "webpb/WebpbExtend.proto";

option (f_opts).ts = {
  default_const_enum: true
  enum_emit_mode: "ts_and_js_dts"
  enum_auto_alias: false
  enum_values_literal: true
};

enum Bar {
  a = 0;
  b = 1;
  c = 2;
}

message FooPb {
  optional Bar type = 1;
}
