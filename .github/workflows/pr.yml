name: PR

on:
  merge_group:
  pull_request:
    branches:
      - master

jobs:
  commitlint:
    name: Check Commit Message
    runs-on: ubuntu-latest
    if: "${{ github.event_name != 'pull_request' || (github.event.pull_request.title != '' && !startsWith(github.event.pull_request.title, 'chore: release') && !startsWith(github.event.pull_request.title, 'chore: bump version to')) }}"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: package.json
          failOnWarnings: true

  build:
    name: Build
    needs: [commitlint]
    if: always() && (needs.commitlint.result == 'success' || needs.commitlint.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 25

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: plugin/go.mod
          cache-dependency-path: plugin/go.mod

      - name: Configure Go for Gradle
        shell: bash
        run: |
          set -euo pipefail
          GO_BIN="$(command -v go)"
          echo "WEBPB_GO=${GO_BIN}" >> "${GITHUB_ENV}"
          echo "Using Go: ${GO_BIN}"
          "${GO_BIN}" version

      - name: Build Go plugins
        shell: bash
        working-directory: plugin
        run: |
          set -euo pipefail
          ext=
          if [ "${RUNNER_OS}" = "Windows" ]; then
            ext=".exe"
          fi
          mkdir -p bin
          go build -o "bin/webpb-protoc-dump${ext}" ./cmd/webpb-dump
          go build -o "bin/webpb-protoc-java${ext}" ./cmd/webpb-java
          go build -o "bin/webpb-protoc-ts${ext}" ./cmd/webpb-ts

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          version: '27.3'

      - name: Build with Gradle
        run: ./gradlew clean build --no-daemon --info -PskipGoTest=true

      - name: Check runtime/ts
        working-directory: runtime/ts
        run: npm ci && npm run check

      - name: Run Go plugin tests
        if: runner.os != 'Windows'
        shell: bash
        working-directory: plugin
        run: go test ./...

      - name: Check sample frontend
        if: runner.os != 'Windows'
        working-directory: sample/frontend
        run: |
          npm ci
          npm run check
