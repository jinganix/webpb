name: CI

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 10 * * *' # Once per day at 10am UTC
  workflow_dispatch:

jobs:
  commitlint:
    name: Check Commit Message
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check-skip.outputs.skip }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: package.json
          failOnWarnings: true

      - name: Skip when release
        id: check-skip
        env:
          COMMIT_FILTER: "^chore: (bump version|release)"
        run: |
          readonly local last_commit_log=$(git log -1 --pretty=format:"%s")
          echo "Last commit log: $last_commit_log"

          readonly local filter_count=$(echo "$last_commit_log" | grep -c -E "$COMMIT_FILTER")

          if [[ "$filter_count" -gt 0 ]]; then
            echo "The last commit log \"$last_commit_log\" contains \"$COMMIT_FILTER\", stopping"
            echo "skip=true" >> ${GITHUB_OUTPUT}
          fi

  build:
    name: Build
    needs: [commitlint]
    if: ${{ needs.commitlint.outputs.skip != 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 25

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: plugin/go.mod
          cache-dependency-path: plugin/go.mod

      - name: Configure Go for Gradle
        shell: bash
        run: |
          set -euo pipefail
          GO_BIN="$(command -v go)"
          echo "WEBPB_GO=${GO_BIN}" >> "${GITHUB_ENV}"
          echo "Using Go: ${GO_BIN}"
          "${GO_BIN}" version

      - name: Build Go plugins
        shell: bash
        working-directory: plugin
        run: |
          set -euo pipefail
          ext=
          if [ "${RUNNER_OS}" = "Windows" ]; then
            ext=".exe"
          fi
          mkdir -p bin
          go build -o "bin/webpb-protoc-dump${ext}" ./cmd/webpb-dump
          go build -o "bin/webpb-protoc-java${ext}" ./cmd/webpb-java
          go build -o "bin/webpb-protoc-ts${ext}" ./cmd/webpb-ts

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          version: '27.3'

      - name: Build with Gradle
        run: ./gradlew clean build --no-daemon --info -PskipGoTest=true

      - name: Check runtime/ts
        working-directory: runtime/ts
        run: npm ci && npm run check

      - name: Run Go plugin tests
        if: runner.os != 'Windows'
        shell: bash
        working-directory: plugin
        run: go test ./...

      - name: Check sample frontend
        if: runner.os != 'Windows'
        working-directory: sample/frontend
        run: |
          npm ci
          npm run check

  codecov:
    name: Codecov
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 25

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: plugin/go.mod
          cache-dependency-path: plugin/go.mod

      - name: Configure Go for Gradle
        shell: bash
        run: |
          set -euo pipefail
          GO_BIN="$(command -v go)"
          echo "WEBPB_GO=${GO_BIN}" >> "${GITHUB_ENV}"
          "${GO_BIN}" version

      - name: Build Go plugins
        shell: bash
        working-directory: plugin
        run: |
          set -euo pipefail
          ext=
          if [ "${RUNNER_OS}" = "Windows" ]; then
            ext=".exe"
          fi
          mkdir -p bin
          go build -o "bin/webpb-protoc-dump${ext}" ./cmd/webpb-dump
          go build -o "bin/webpb-protoc-java${ext}" ./cmd/webpb-java
          go build -o "bin/webpb-protoc-ts${ext}" ./cmd/webpb-ts

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          version: '27.3'

      - name: Build with Gradle
        run: ./gradlew clean build --no-daemon -PskipGoTest=true

      - name: Check runtime/ts
        working-directory: runtime/ts
        run: npm ci && npm run test

      - name: Run Go plugin tests
        if: runner.os != 'Windows'
        shell: bash
        working-directory: plugin
        run: go test ./...

      - name: Check sample frontend
        working-directory: sample/frontend
        run: npm ci && npm run check

      - name: Upload lib coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lib/commons/build/reports/jacoco/test/jacocoTestReport.xml,lib/utilities/build/reports/jacoco/test/jacocoTestReport.xml
          flags: lib
          name: lib
          disable_search: true
          fail_ci_if_error: false

      - name: Upload runtime-java coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: runtime/java/build/reports/jacoco/test/jacocoTestReport.xml,runtime/processor/build/reports/jacoco/test/jacocoTestReport.xml
          flags: runtime-java
          name: runtime-java
          disable_search: true
          fail_ci_if_error: false

      - name: Upload sample-backend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: sample/backend/build/reports/jacoco/test/jacocoTestReport.xml
          flags: sample-backend
          name: sample-backend
          disable_search: true
          fail_ci_if_error: false

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: sample/frontend/coverage/lcov.info
          flags: frontend
          name: frontend
          disable_search: true
          fail_ci_if_error: false

      - name: Upload runtime-ts coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: runtime/ts/coverage/lcov.info
          flags: runtime-ts
          name: runtime-ts
          disable_search: true
          fail_ci_if_error: false

  publish:
    name: Publish
    runs-on: ubuntu-latest
    env:
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.NEXUS_REPO_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.NEXUS_REPO_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - name: Skip release version
        run: |
          current_version=$(grep -m1 'version =' gradle.properties | grep -oE '([0-9]+\.[0-9]+\.[0-9]+.*)')
          echo "Current version: ${current_version}"
          echo "current_version=${current_version}" >> "${GITHUB_ENV}"

      - name: Setup JDK
        if: "${{ endsWith(env.current_version, '-SNAPSHOT') }}"
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 25

      - name: Publish to Nexus
        if: "${{ endsWith(env.current_version, '-SNAPSHOT') }}"
        run: ./gradlew publish -Dorg.gradle.parallel=false --info
